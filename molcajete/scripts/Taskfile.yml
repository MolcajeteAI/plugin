version: "3"

vars:
  SCRIPTS_DIR: '{{.TASKFILE_DIR}}'
  MAX_PARALLEL: '{{.MOLCAJETE_MAX_PARALLEL | default "1"}}'
  TIMEOUT: '{{.MOLCAJETE_TASK_TIMEOUT | default "900"}}'

tasks:
  run:
    desc: Launch the coordinated build pipeline
    cmds:
      - bash {{.SCRIPTS_DIR}}/dispatch.sh "{{.CLI_ARGS}}"
    env:
      MOLCAJETE_MAX_PARALLEL: "{{.MAX_PARALLEL}}"
      MOLCAJETE_TASK_TIMEOUT: "{{.TIMEOUT}}"

  status:
    desc: Display current task status from tasks.json
    cmds:
      - bash {{.SCRIPTS_DIR}}/status.sh "{{.CLI_ARGS}}"

  merge:
    desc: Merge a worktree branch into the current branch
    cmds:
      - bash {{.SCRIPTS_DIR}}/merge.sh "{{.CLI_ARGS}}"
